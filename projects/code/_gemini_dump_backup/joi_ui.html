<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joi — For Lonnie</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0c10;--bg2:#12151c;--bg3:#1a1e28;
  --amber:#f0a030;--amber-dim:#a06820;--cyan:#40c8e0;--cyan-dim:#206878;
  --text:#d8dce6;--text-dim:#707888;--text-bright:#f0f2f8;
  --danger:#e04040;--success:#40c060;
  --radius:8px;--glow:0 0 12px rgba(240,160,48,0.3);
}
html,body{height:100%;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text)}

/* ── Login Screen ─────────────────────────────── */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px}
#login-screen h1{font-size:48px;color:var(--amber);letter-spacing:6px;text-shadow:var(--glow)}
#login-screen .subtitle{color:var(--text-dim);font-size:14px;letter-spacing:2px}
#login-screen input{background:var(--bg2);border:1px solid var(--amber-dim);color:var(--text);padding:12px 20px;border-radius:var(--radius);font-size:16px;width:300px;text-align:center}
#login-screen input:focus{outline:none;border-color:var(--amber);box-shadow:var(--glow)}
#login-screen button{background:var(--amber);color:var(--bg);border:none;padding:12px 40px;border-radius:var(--radius);font-size:16px;cursor:pointer;font-weight:600;letter-spacing:1px}
#login-screen button:hover{filter:brightness(1.1)}
#login-screen .error{color:var(--danger);font-size:13px;min-height:20px}

/* ── Main Layout ──────────────────────────────── */
#app{display:none;height:100%;flex-direction:column}

/* Top Bar */
#topbar{display:flex;align-items:center;gap:16px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid #1e222e;flex-shrink:0}
#avatar-container{width:44px;height:44px;border-radius:50%;overflow:hidden;border:2px solid var(--amber-dim);flex-shrink:0;position:relative;transition:box-shadow 0.3s}
#avatar-container img{width:100%;height:100%;object-fit:cover}
#avatar-container.speaking{border-color:var(--amber);box-shadow:0 0 16px rgba(240,160,48,0.5)}
#avatar-container.speaking::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:16px;height:6px;background:var(--amber);border-radius:50%;animation:lipSync 0.15s ease-in-out infinite alternate}
@keyframes lipSync{0%{height:3px;width:12px;opacity:0.7}100%{height:7px;width:16px;opacity:1}}
#topbar-title{font-size:20px;font-weight:700;color:var(--amber);letter-spacing:2px;flex-shrink:0}
#topbar-subtitle{font-size:12px;color:var(--text-dim);margin-left:-8px;flex-shrink:0}

/* Model Status Lights */
#model-bar{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;align-items:center}
.model-light{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:var(--bg3);font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--text-dim);border:1px solid #252830;transition:all 0.3s}
.model-light .dot{width:8px;height:8px;border-radius:50%;background:#404050;transition:all 0.3s}
.model-light.online .dot{background:var(--success);box-shadow:0 0 6px rgba(64,192,96,0.5)}
.model-light.offline .dot{background:#505060}
.model-light.active{border-color:var(--amber);color:var(--amber)}
.model-light.active .dot{background:var(--amber);box-shadow:0 0 8px rgba(240,160,48,0.6)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.model-light.flash .dot{animation:pulse 0.4s ease-in-out 3}

/* Controls */
#topbar-controls{display:flex;gap:8px;flex-shrink:0}
#topbar-controls button{background:var(--bg3);border:1px solid #252830;color:var(--text-dim);padding:6px 12px;border-radius:var(--radius);font-size:12px;cursor:pointer}
#topbar-controls button:hover{border-color:var(--cyan-dim);color:var(--cyan)}

/* ── Content Area ────────────────────────────── */
#content{display:flex;flex:1;overflow:hidden}

/* Sidebar */
#sidebar{width:260px;background:var(--bg2);border-right:1px solid #1e222e;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;transition:margin-left 0.3s}
#sidebar.collapsed{margin-left:-260px}
.sidebar-section{border-bottom:1px solid #1e222e}
.sidebar-header{padding:12px 16px;font-size:12px;font-weight:700;color:var(--amber-dim);letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sidebar-header:hover{color:var(--amber)}
.sidebar-body{padding:0 12px 12px;font-size:13px}
.sidebar-body a{color:var(--cyan);text-decoration:none;display:block;padding:4px 8px;border-radius:4px}
.sidebar-body a:hover{background:var(--bg3)}
.sidebar-body .empty{color:var(--text-dim);font-style:italic;padding:4px 8px}

/* Chat */
#chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:75%;padding:12px 16px;border-radius:var(--radius);line-height:1.5;font-size:14px;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:#1a2a3a;color:var(--text-bright);border-bottom-right-radius:2px}
.msg.assistant{align-self:flex-start;background:var(--bg3);color:var(--text);border-bottom-left-radius:2px;border-left:3px solid var(--amber-dim)}
.msg.assistant a{color:var(--cyan)}
.msg.system{align-self:center;color:var(--text-dim);font-size:12px;font-style:italic;padding:4px 12px;background:transparent}
.msg .download-link{display:inline-block;margin-top:6px;padding:4px 12px;background:var(--cyan-dim);color:var(--text-bright);border-radius:4px;text-decoration:none;font-size:12px}
.msg .download-link:hover{background:var(--cyan)}
.typing-indicator{align-self:flex-start;color:var(--amber-dim);font-size:13px;padding:8px 16px}
.typing-indicator span{animation:typingDot 1.4s infinite;display:inline-block}
.typing-indicator span:nth-child(2){animation-delay:0.2s}
.typing-indicator span:nth-child(3){animation-delay:0.4s}
@keyframes typingDot{0%,60%,100%{opacity:0.3}30%{opacity:1}}

/* Input Bar */
#input-bar{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--bg2);border-top:1px solid #1e222e;flex-shrink:0}
#mic-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--text-dim);background:transparent;color:var(--text-dim);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;flex-shrink:0}
#mic-btn:hover{border-color:var(--cyan);color:var(--cyan)}
#mic-btn.listening{border-color:var(--danger);color:var(--danger);animation:pulse 1s infinite}
#mic-btn.wake-active{border-color:var(--success);color:var(--success)}
#msg-input{flex:1;background:var(--bg3);border:1px solid #252830;color:var(--text);padding:12px 16px;border-radius:var(--radius);font-size:15px}
#msg-input:focus{outline:none;border-color:var(--amber-dim)}
#send-btn{background:var(--amber);color:var(--bg);border:none;padding:12px 24px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;flex-shrink:0}
#send-btn:hover{filter:brightness(1.15)}
#voice-status{font-size:11px;color:var(--text-dim);flex-shrink:0;min-width:100px;text-align:center}

/* ── Scrollbar ────────────────────────────────── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#303040;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#404050}

/* ── Responsive ───────────────────────────────── */
@media(max-width:768px){
  #sidebar{display:none}
  .msg{max-width:90%}
}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="login-screen">
  <h1>JOI</h1>
  <div class="subtitle">BLADE RUNNER 2049 &mdash; FOR LONNIE</div>
  <input id="login-pw" type="password" placeholder="Password" autofocus>
  <button onclick="doLogin()">Enter</button>
  <div id="login-error" class="error"></div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app">

  <!-- Top Bar -->
  <div id="topbar">
    <div id="avatar-container"><img id="avatar-img" src="" alt="Joi"></div>
    <span id="topbar-title">JOI</span>
    <span id="topbar-subtitle">for Lonnie</span>

    <div id="model-bar">
      <div class="model-light" data-provider="openai" id="ml-chatgpt"><span class="dot"></span>ChatGPT</div>
      <div class="model-light" data-provider="openai" id="ml-gpt4o"><span class="dot"></span>GPT-4o</div>
      <div class="model-light" data-provider="gemini" id="ml-gemini"><span class="dot"></span>Gemini</div>
      <div class="model-light" data-provider="claude" id="ml-claude"><span class="dot"></span>Claude</div>
      <div class="model-light" data-provider="claude-code" id="ml-cc"><span class="dot"></span>Claude Code</div>
      <div class="model-light" data-provider="local" id="ml-mistral"><span class="dot"></span>Mistral</div>
    </div>

    <div id="topbar-controls">
      <button onclick="toggleSidebar()">Menu</button>
      <button onclick="doAdminLogin()">Admin</button>
      <button onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-header" onclick="toggleSection('projects-body')">Projects <span>&#9662;</span></div>
        <div id="projects-body" class="sidebar-body"><div class="empty">Loading...</div></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-header" onclick="toggleSection('avatars-body')">Avatars <span>&#9662;</span></div>
        <div id="avatars-body" class="sidebar-body"><div class="empty">Loading...</div></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-header" onclick="toggleSection('apps-body')">App Launcher <span>&#9662;</span></div>
        <div id="apps-body" class="sidebar-body"><div class="empty">Loading...</div></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-header" onclick="toggleSection('files-body')">Downloads <span>&#9662;</span></div>
        <div id="files-body" class="sidebar-body"><div class="empty">No files yet</div></div>
      </div>
    </aside>

    <!-- Chat Area -->
    <div id="chat-area">
      <div id="messages"></div>
      <div id="input-bar">
        <button id="mic-btn" onclick="togglePTT()" title="Push-to-Talk (or say 'Hey Joi')">&#127908;</button>
        <span id="voice-status">Mic idle</span>
        <input id="msg-input" type="text" placeholder="Talk to Joi..." autofocus>
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  JOI UI — Complete Frontend
// ═══════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);
const messagesEl   = $('messages');
const msgInput     = $('msg-input');
const micBtn       = $('mic-btn');
const voiceStatus  = $('voice-status');
let isAdmin = false;
let ttsEnabled = true;
let generatedFiles = [];  // track downloadable files

// ── LOGIN ──────────────────────────────────────────────────────

$('login-pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin(){
  const pw = $('login-pw').value.trim();
  if(!pw) return;
  try {
    const res = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password: pw})});
    const data = await res.json();
    if(data.ok){
      isAdmin = data.admin || false;
      $('login-screen').style.display='none';
      $('app').style.display='flex';
      initApp();
    } else {
      $('login-error').textContent = data.error || 'Login failed';
    }
  } catch(e){ $('login-error').textContent = 'Connection error'; }
}

async function doAdminLogin(){
  const pw = prompt('Admin password:');
  if(!pw) return;
  try {
    const res = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password: pw, admin: true})});
    const data = await res.json();
    if(data.ok){ isAdmin = true; addSystemMsg('Admin mode enabled.'); }
    else addSystemMsg('Admin login failed: ' + (data.error||''));
  } catch(e){ addSystemMsg('Admin login error.'); }
}

async function doLogout(){
  await fetch('/logout', {method:'POST'});
  location.reload();
}

// ── INIT ────────────────────────────────────────────────────────

function initApp(){
  loadHistory();
  loadAvatar();
  loadProjects();
  loadAvatars();
  loadApps();
  pollStatus();
  setInterval(pollStatus, 15000);
  initWakeWord();
  msgInput.focus();
}

// ── CHAT ────────────────────────────────────────────────────────

msgInput.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }});

async function sendMessage(text){
  const msg = text || msgInput.value.trim();
  if(!msg) return;
  msgInput.value = '';
  addMsg('user', msg);
  showTyping();

  try {
    const res = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: msg})});
    const data = await res.json();
    hideTyping();
    if(data.ok && data.reply){
      addMsg('assistant', data.reply);
      flashModelLights();
      extractDownloadLinks(data.reply);
      if(ttsEnabled) speakReply(data.reply, data.mood || 'neutral');
    } else {
      addMsg('assistant', data.error || data.reply || 'No response.');
    }
  } catch(e){
    hideTyping();
    addMsg('assistant', 'Connection error: ' + e.message);
  }
}

function addMsg(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  // Convert file URLs to clickable download links
  const processed = text.replace(/\/file\/([^\s"'<>]+)/g, (match) => {
    return `<a class="download-link" href="${match}" target="_blank" download>Download ${match.split('/').pop()}</a>`;
  });
  div.innerHTML = processed;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addSystemMsg(text){
  const div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

let typingEl = null;
function showTyping(){
  if(typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator';
  typingEl.innerHTML = 'Joi is thinking<span>.</span><span>.</span><span>.</span>';
  messagesEl.appendChild(typingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping(){
  if(typingEl){ typingEl.remove(); typingEl=null; }
}

// ── HISTORY ─────────────────────────────────────────────────────

async function loadHistory(){
  try {
    const res = await fetch('/history?limit=50');
    const data = await res.json();
    if(data.ok && data.history){
      data.history.forEach(m => {
        if(m.role === 'user' || m.role === 'assistant'){
          addMsg(m.role, m.content);
        }
      });
      if(data.history.length) addSystemMsg('--- history loaded ---');
    }
  } catch(e){}
}

// ── FILE DOWNLOAD EXTRACTION ────────────────────────────────────

function extractDownloadLinks(reply){
  const matches = reply.match(/\/file\/[^\s"'<>]+/g);
  if(matches){
    const filesBody = $('files-body');
    matches.forEach(url => {
      const name = url.split('/').pop();
      if(!generatedFiles.includes(url)){
        generatedFiles.push(url);
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.download = name;
        a.textContent = name;
        // Replace "empty" placeholder
        const empty = filesBody.querySelector('.empty');
        if(empty) empty.remove();
        filesBody.appendChild(a);
      }
    });
  }
}

// ── TTS ─────────────────────────────────────────────────────────

async function speakReply(text, mood){
  mood = mood || 'neutral';
  const clean = text.replace(/```[\s\S]*?```/g, '').replace(/[#*_`>]/g, '').trim();
  if(!clean || clean.length > 500) return;

  const avatarEl = $('avatar-container');
  function startSpeaking(){ avatarEl?.classList.add('speaking'); }
  function stopSpeaking(){ avatarEl?.classList.remove('speaking'); }

  try {
    const res = await fetch('/tts', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text: clean.substring(0, 300), mood: mood})});
    const data = await res.json();
    if(data.ok && data.url){
      const audio = new Audio(data.url);
      audio.onplay = startSpeaking;
      audio.onended = stopSpeaking;
      audio.onerror = stopSpeaking;
      audio.play().catch(stopSpeaking);
      return;
    }
  } catch(e){}

  // Fallback: browser TTS with lip-sync
  if('speechSynthesis' in window){
    const utter = new SpeechSynthesisUtterance(clean.substring(0, 200));
    utter.rate = 0.95; utter.pitch = 1.05;
    utter.onstart = startSpeaking;
    utter.onend = stopSpeaking;
    utter.onerror = stopSpeaking;
    speechSynthesis.speak(utter);
  }
}

// ── WAKE WORD + PUSH-TO-TALK ────────────────────────────────────

let recognition = null;
let wakeWordActive = false;
let pttMode = false;         // true = push-to-talk engaged
let wakeListening = false;   // true = continuous wake word listening
let silenceTimer = null;

function initWakeWord(){
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRec){
    voiceStatus.textContent = 'No mic support';
    micBtn.style.display = 'none';
    return;
  }

  recognition = new SpeechRec();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = handleSpeechResult;
  recognition.onerror = (e) => {
    console.log('Speech error:', e.error);
    if(e.error === 'not-allowed'){
      voiceStatus.textContent = 'Mic blocked';
      return;
    }
    // Auto-restart for transient errors
    if(wakeListening && !pttMode){
      setTimeout(startWakeWordListening, 1000);
    }
  };
  recognition.onend = () => {
    if(pttMode){
      pttMode = false;
      micBtn.classList.remove('listening');
      voiceStatus.textContent = 'Wake word: on';
      // Resume wake word listening
      setTimeout(startWakeWordListening, 300);
    } else if(wakeListening){
      // Continuous mode ended unexpectedly, restart
      setTimeout(startWakeWordListening, 500);
    }
  };

  // Start continuous wake word listening
  startWakeWordListening();
}

function startWakeWordListening(){
  if(!recognition) return;
  try {
    wakeListening = true;
    wakeWordActive = false;
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.start();
    micBtn.classList.add('wake-active');
    micBtn.classList.remove('listening');
    voiceStatus.textContent = 'Say "Hey Joi"';
  } catch(e){
    // Already started
  }
}

function handleSpeechResult(event){
  let finalTranscript = '';
  let interimTranscript = '';

  for(let i = event.resultIndex; i < event.results.length; i++){
    const t = event.results[i][0].transcript;
    if(event.results[i].isFinal){
      finalTranscript += t;
    } else {
      interimTranscript += t;
    }
  }

  const allText = (interimTranscript + ' ' + finalTranscript).toLowerCase().trim();

  // ── PUSH-TO-TALK mode: capture everything as the message
  if(pttMode){
    if(finalTranscript.trim()){
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        pttMode = false;
        recognition.stop();
        const cleaned = finalTranscript.trim();
        if(cleaned.length > 1){
          sendMessage(cleaned);
        }
      }, 1500);
    }
    voiceStatus.textContent = 'Listening... ' + (interimTranscript || finalTranscript).substring(0, 40);
    return;
  }

  // ── WAKE WORD detection mode
  if(!wakeWordActive){
    if(allText.includes('hey joi') || allText.includes('hey joy') || allText.includes('a joi')){
      wakeWordActive = true;
      voiceStatus.textContent = "I'm listening, Lonnie...";
      micBtn.classList.add('listening');
      micBtn.classList.remove('wake-active');
      // Play a subtle acknowledgment
      playChime();
      // Set a silence timer — if no speech after wake, go back to idle
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        wakeWordActive = false;
        micBtn.classList.remove('listening');
        micBtn.classList.add('wake-active');
        voiceStatus.textContent = 'Say "Hey Joi"';
      }, 6000);
    }
    return;
  }

  // ── ACTIVE listening after wake word: capture the command
  if(wakeWordActive){
    if(finalTranscript.trim()){
      clearTimeout(silenceTimer);
      // Remove the wake phrase from the command
      let cmd = finalTranscript.trim();
      cmd = cmd.replace(/hey joi\s*/i, '').replace(/hey joy\s*/i, '').trim();

      silenceTimer = setTimeout(() => {
        wakeWordActive = false;
        micBtn.classList.remove('listening');
        micBtn.classList.add('wake-active');
        voiceStatus.textContent = 'Say "Hey Joi"';
        if(cmd.length > 1){
          sendMessage(cmd);
        }
      }, 2000);
    }
    voiceStatus.textContent = (interimTranscript || finalTranscript || '...').substring(0, 50);
  }
}

// Push-to-Talk button
function togglePTT(){
  if(!recognition){
    voiceStatus.textContent = 'No mic support';
    return;
  }
  if(pttMode){
    // Stop PTT
    pttMode = false;
    recognition.stop();
    return;
  }

  // Start PTT
  try { recognition.stop(); } catch(e){}
  wakeListening = false;
  wakeWordActive = false;

  setTimeout(() => {
    pttMode = true;
    recognition.continuous = true;
    recognition.interimResults = true;
    try {
      recognition.start();
    } catch(e){}
    micBtn.classList.add('listening');
    micBtn.classList.remove('wake-active');
    voiceStatus.textContent = 'Speak now...';
  }, 300);
}

function playChime(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    osc.start(); osc.stop(ctx.currentTime + 0.25);
  } catch(e){}
}

// ── MODEL STATUS POLLING ────────────────────────────────────────

async function pollStatus(){
  try {
    const res = await fetch('/status');
    const data = await res.json();
    if(!data.ok) return;
    const p = data.providers || {};

    setLight('ml-chatgpt', p.openai?.ok);
    setLight('ml-gpt4o',   p.openai?.ok);
    setLight('ml-gemini',  p.gemini?.ok);
    setLight('ml-claude',  p.claude?.ok);
    setLight('ml-mistral', p.local?.ok);

    // Claude Code: check if `claude` CLI is accessible (static for now)
    setLight('ml-cc', false);
  } catch(e){}
}

function setLight(id, online){
  const el = $(id);
  if(!el) return;
  el.classList.toggle('online', !!online);
  el.classList.toggle('offline', !online);
}

function flashModelLights(){
  document.querySelectorAll('.model-light.online').forEach(el => {
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 1500);
  });
}

// ── AVATAR ──────────────────────────────────────────────────────

async function loadAvatar(){
  try {
    const res = await fetch('/avatar');
    const data = await res.json();
    if(data.ok && data.url){
      $('avatar-img').src = data.url;
    } else {
      $('avatar-img').src = '';
    }
  } catch(e){}
}

async function loadAvatars(){
  try {
    const res = await fetch('/avatars');
    const data = await res.json();
    const body = $('avatars-body');
    body.innerHTML = '';
    if(data.ok && data.avatars?.length){
      data.avatars.forEach(av => {
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = av.name + (av.is_current ? ' *' : '');
        a.onclick = (e) => { e.preventDefault(); switchAvatar(av.name); };
        body.appendChild(a);
      });
    } else {
      body.innerHTML = '<div class="empty">No avatars</div>';
    }
  } catch(e){}
}

async function switchAvatar(name){
  try {
    const res = await fetch('/avatars/switch', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name})});
    const data = await res.json();
    if(data.ok && data.url){
      $('avatar-img').src = data.url;
      addSystemMsg('Avatar switched to ' + name);
    }
  } catch(e){}
}

// ── PROJECTS ────────────────────────────────────────────────────

async function loadProjects(){
  try {
    const res = await fetch('/projects');
    const data = await res.json();
    const body = $('projects-body');
    body.innerHTML = '';
    if(data.ok && data.projects){
      const categories = Object.keys(data.projects);
      if(categories.length === 0){
        body.innerHTML = '<div class="empty">No projects yet</div>';
        return;
      }
      categories.forEach(cat => {
        const h = document.createElement('div');
        h.style.cssText = 'font-weight:600;color:var(--amber-dim);margin:8px 0 4px;font-size:12px;text-transform:uppercase';
        h.textContent = cat;
        body.appendChild(h);
        data.projects[cat].forEach(f => {
          const a = document.createElement('a');
          a.href = f.url;
          a.target = '_blank';
          a.textContent = f.name;
          body.appendChild(a);
        });
      });
    } else {
      body.innerHTML = '<div class="empty">No projects</div>';
    }
  } catch(e){}
}

// ── APPS LAUNCHER ───────────────────────────────────────────────

async function loadApps(){
  try {
    const res = await fetch('/apps');
    const data = await res.json();
    const body = $('apps-body');
    body.innerHTML = '';
    if(data.ok && data.apps?.length){
      data.apps.forEach(app => {
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = app.name;
        a.onclick = (e) => { e.preventDefault(); launchApp(app.name); };
        body.appendChild(a);
      });
    } else {
      body.innerHTML = '<div class="empty">No apps</div>';
    }
  } catch(e){}
}

async function launchApp(name){
  try {
    const res = await fetch('/apps/launch', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({app_name: name})});
    const data = await res.json();
    addSystemMsg(data.message || data.error || 'App launch attempted');
  } catch(e){}
}

// ── SIDEBAR TOGGLE ──────────────────────────────────────────────

function toggleSidebar(){
  $('sidebar').classList.toggle('collapsed');
}

function toggleSection(id){
  const el = $(id);
  if(el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ── CHECK SESSION ON LOAD ───────────────────────────────────────

(async function checkSession(){
  try {
    const res = await fetch('/status');
    if(res.ok){
      const data = await res.json();
      // If we got a valid response, we might be logged in already
      // The /status endpoint doesn't require auth, but we can check
      // by trying to fetch history
      const hres = await fetch('/history?limit=1');
      if(hres.ok){
        $('login-screen').style.display='none';
        $('app').style.display='flex';
        initApp();
        return;
      }
    }
  } catch(e){}
  // Show login
  $('login-screen').style.display='flex';
})();

</script>
