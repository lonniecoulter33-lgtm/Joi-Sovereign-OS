<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Assistant</title>
    <script src="requestPermissions.js"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      :root {
        --popup-bg: #303030;
        --popup-fg: #f5f5f5;
        --shadow-clr: rgba(0, 0, 0, 1);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --popup-bg: #f1f1f1;
          --popup-fg: #212121;
          --shadow-clr: rgba(0, 0, 0, 0.4);
        }

        body {
          background: #ffffff;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #212121;
        }
      }

      .popup {
        text-align: center;
        width: auto;
        padding: 16px;
        background: var(--popup-bg);
        border-radius: 12px;
        color: var(--popup-fg);
        box-shadow: 0 0px 24px var(--shadow-clr);
        position: absolute;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
      }

      .visualizer-wrapper {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="popup" id="voice-popup">
      <div class="visualizer-wrapper">
        <strong>Click “Allow while visiting the site”</strong><br/>
        for Voice Assistant to function properly.
      </div>
    </div>
  </body>
</html>
